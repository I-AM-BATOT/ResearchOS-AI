# Defines a custom ResearchOS AI theme with matching light and dark variants.
# Users can still switch between them via the hamburger menu > Settings >
# Theme -- toolbarMode is intentionally left at its default ("auto") so that
# menu (and therefore the dark/light toggle) stays available.

[theme]
primaryColor = "#4F46E5"
font = "sans serif"

[theme.light]
backgroundColor = "#FFFFFF"
secondaryBackgroundColor = "#F8F9FC"
textColor = "#1F2333"

[theme.dark]
backgroundColor = "#0E1117"
secondaryBackgroundColor = "#1B1F2A"
textColor = "#E5E7EB"
